name: DA DP Tag and pre deploy Holding Verification App
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
jobs:
  generate-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - id: next-tag
        shell: python
        run: |
          import json, os, urllib.request

          url = f"{os.environ['GITHUB_API_URL']}/repos/nationalarchives/da-dp-holding-verification/tags"
          headers = {"Accept": "application/vnd.github+json", "Authorization": f"Bearer {os.getenv("GH_TOKEN")}"}

          tag_name = json.load(urllib.request.urlopen(urllib.request.Request(url, headers=headers)))[0]["name"]
          split_tags = tag_name.split(".")
          new_tag = ".".join(split_tags[:-1] + [str(int(split_tags[-1]) + 1)])

          with open(os.environ["GITHUB_OUTPUT"], 'a') as go:
              go.write(f"next-version={new_tag}\n")
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upgrade pip & create exe file
        run: |
          python -m pip install --upgrade pip
          Invoke-WebRequest https://raw.githubusercontent.com/Eliav2/tkinterdnd2/refs/heads/master/hook-tkinterdnd2.py -OutFile .\hook-tkinterdnd2.py
          pip install -r requirements.txt
          pyinstaller --icon=".\folder_smile.ico" holding_verification.py --additional-hooks-dir=.
          Copy-Item -Path config.ini -Destination dist/holding_verification
          mkdir zipped_executable
          Compress-Archive -Path dist/* -Destination zipped_executable/da-holding-verification-windows-64.zip
          gh release create --generate-notes ${{ steps.next-tag.outputs.next-version }} zipped_executable/da-holding-verification-windows-64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
